---
name: ✨ Feature Request
description: Propose a new feature for Halal OS
title: "[FEAT] "
labels: ["enhancement", "needs-discussion"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        **Thank you for helping improve Halal OS!**
        Please describe your feature request clearly.

  - type: checkboxes
    id: existing-search
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched existing issues and discussions — this is not a duplicate
          required: true

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      options:
        - Islamic Feature (Athan, Quran, Qibla, Zakat, etc.)
        - Privacy / Security
        - Desktop Environment (HDK)
        - Halal Browser
        - Halal Store
        - Halal Cloud
        - AI Integration (Sama)
        - Accessibility / Localization
        - Developer Tooling
        - Documentation
        - Performance
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem to Solve
      description: What problem does this feature solve? Who does it help?
      placeholder: "As a Muslim user, I want to... so that I can..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your ideal solution
    validations:
      required: true

  - type: textarea
    id: islamic-relevance
    attributes:
      label: Islamic Relevance (if applicable)
      description: Does this feature have an Islamic dimension? Cite any scholarly references if relevant.

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Critical — I can't use Halal OS effectively without this
        - High — Would significantly improve my experience
        - Medium — Would be a nice improvement
        - Low — Just an idea

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to implement this feature and submit a PR
        - label: I can help test and provide feedback
        - label: I can help with documentation
