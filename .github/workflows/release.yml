name: 🚀 Release Automation

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%an)" | head -50)
          else
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%an)")
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "Halal OS ${{ steps.version.outputs.VERSION }} ☪️"
          body: |
            ## ☪️ Halal OS ${{ steps.version.outputs.VERSION }}

            *بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ*

            ### What's Changed
            ${{ steps.changelog.outputs.CHANGELOG }}

            ---

            ### 🚀 Getting Started
            ```bash
            git clone https://github.com/ahmedfawzyjr/Halal-OS.git
            cd Halal-OS
            python -m http.server 8888
            ```

            Open http://localhost:8888 in your browser.

            ### 📦 Backend Modules
            See [CONTRIBUTING.md](https://github.com/ahmedfawzyjr/Halal-OS/blob/main/CONTRIBUTING.md) for build instructions.

            ---
            *جزاكم الله خيراً to all contributors!*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'rc') }}

  build-rust-release:
    name: Build Rust Binaries
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      matrix:
        module: [security, browser]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        working-directory: ${{ matrix.module }}
        run: cargo build --release

      - name: Upload binary artifact
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.module }}/target/release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
